<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lefto | View Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Lefto Aesthetic Brown Light Theme Colors */
            --bg-main: #FDFBF8;
            --bg-secondary: #F4EFEB;
            --primary-brown: #8A5A44;
            --text-dark: #3E2723;
            --text-light: #7A6960;
            --white: #FFFFFF;
            --border-color: #EAE0D5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Navigation --- */
        .navbar {
            background-color: var(--white);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-brown);
            text-decoration: none;
        }

        .back-btn {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-light);
        }

        /* --- Main Content Area --- */
        .content-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-brown);
            margin-bottom: 5px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* --- Modern Data Table --- */
        .table-container {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(138, 90, 68, 0.03);
            overflow-x: auto; /* Keeps table scrollable on small mobile screens */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--bg-secondary);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 16px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
            color: var(--text-dark);
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: #FAFAF8;
        }

        /* Remove bottom border from the very last row */
        tbody tr:last-child td {
            border-bottom: none;
        }

        /* User Profile/Name Styling */
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%; /* Makes the uploaded photo a perfect circle */
            object-fit: cover;
            border: 2px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .contact-info {
            color: var(--text-light);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/myapp/admin_dashboard/" class="brand-logo">Lefto. Admin</a>
        <a href="/myapp/admin_dashboard/" class="back-btn">← Back to Dashboard</a>
    </nav>

    <div class="content-wrapper">
        
        <div class="page-header">
            <h2>Registered Users</h2>
            <p>View the complete directory of customers using the Lefto platform.</p>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Email Address</th>
                        <th>Phone Number</th>
                        <th>Address</th>
                    </tr>
                </thead>
                <tbody>
                    
                    {% for i in data %}
                    
                    <tr>
                        <td>
                            <div class="user-info">
                                {% if i.photo %}
                                    <img src="{{ i.photo.url }}" alt="{{ i.name }}" class="user-avatar">
                                {% else %}
                                    <div class="user-avatar" style="background:var(--primary-brown); display:flex; align-items:center; justify-content:center; color:white;">U</div>
                                {% endif %}
                                <span class="user-name">{{ i.name }}</span>
                            </div>
                        </td>
                        <td class="contact-info">{{ i.email }}</td>
                        <td class="contact-info">{{ i.phone }}</td>
                        <td class="contact-info">{{ i.address }}</td>
                    </tr>

                    {% endfor %}
                    </tbody>
            </table>
        </div>

    </div>

</body>
</html>
