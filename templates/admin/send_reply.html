<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lefto | Admin Reply</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Lefto Aesthetic Brown Theme Colors */
            --bg-main: #FDFBF8;        
            --primary-brown: #8A5A44;  
            --hover-brown: #6A4432;
            --text-dark: #3E2723;      
            --text-light: #7A6960;     
            --white: #FFFFFF;
            --border-color: #EAE0D5;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px 0 rgba(138, 90, 68, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #FDFBF8 0%, #F4EFEB 50%, #EAE0D5 100%);
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Animated Background Blobs --- */
        .blob-1, .blob-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            z-index: -1;
            opacity: 0.5;
            animation: floatBlob 15s ease-in-out infinite;
        }

        .blob-1 {
            top: -50px; left: -50px;
            width: 400px; height: 400px;
            background: #8A5A44; 
        }

        .blob-2 {
            bottom: -100px; right: -50px;
            width: 500px; height: 500px;
            background: #D5B4A3; 
            animation-delay: -7s;
            animation-direction: reverse;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* --- Reusable Glass Class --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* --- Top Navigation --- */
        .navbar {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-brown);
            text-decoration: none;
        }

        .back-btn {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* --- Form Container --- */
        .form-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .form-card {
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 24px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-brown);
            margin-bottom: 5px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.5;
        }

        /* --- Context Box (Original Complaint) --- */
        .context-box {
            background-color: rgba(255, 255, 255, 0.4);
            border-left: 4px solid var(--primary-brown);
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 30px;
        }

        .context-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary-brown);
            margin-bottom: 8px;
            display: block;
        }

        .context-text {
            font-size: 1.05rem;
            color: var(--text-dark);
            line-height: 1.5;
            font-style: italic;
        }

        /* --- Textarea Input --- */
        .input-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 10px;
            margin-left: 5px;
        }

        .input-group textarea {
            width: 100%;
            padding: 16px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            resize: vertical;
            min-height: 150px;
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        .input-group textarea::placeholder {
            color: #A89F96;
        }

        .input-group textarea:focus {
            border-color: var(--primary-brown);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(138, 90, 68, 0.1);
        }

        /* --- Submit Button --- */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 90, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: var(--hover-brown);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 90, 68, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 600px) {
            .form-card { padding: 30px 20px; }
            .form-header h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <nav class="navbar glass-panel">
        <a href="/myapp/admin_dashboard/" class="brand-logo">Lefto. Admin</a>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
    </nav>

    <div class="form-wrapper">
        <div class="form-card glass-panel">
            
            <div class="form-header">
                <h2>Respond to Customer</h2>
                <p>Provide a helpful resolution to the customer's issue.</p>
            </div>

            <div class="context-box">
                <span class="context-label">Customer's Message:</span>
                <div class="context-text">
                    "{{ data.complaint }}"
                </div>
            </div>

            <form action="/myapp/send_reply/{{data.id}}/" method="post">
                {% csrf_token %}

                <div class="input-group">
                    <label for="reply">Your Administrator Reply</label>
                    <textarea 
                        id="reply" 
                        name="reply" 
                        placeholder="E.g., Hello! We apologize for the inconvenience. We have contacted the hotel and refunded your order..." 
                        required></textarea>
                </div>

                <button type="submit" name="send" class="submit-btn">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Send Resolution
                </button>

            </form>

        </div>
    </div>

</body>
</html>
