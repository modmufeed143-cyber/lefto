<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lefto | Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Lefto Aesthetic Brown Light Theme Colors */
            --bg-main: #FDFBF8;
            --bg-secondary: #F4EFEB;
            --primary-brown: #8A5A44;
            --hover-brown: #6A4432;
            --text-dark: #3E2723;
            --text-light: #7A6960;
            --white: #FFFFFF;
            --border-color: #EAE0D5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Navigation --- */
        .navbar {
            background-color: var(--white);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-brown);
            text-decoration: none;
        }

        .back-btn {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-light);
        }

        /* --- Stunning Floating Django Messages --- */
        .message-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(138, 90, 68, 0.15);
            display: flex;
            align-items: center;
            opacity: 1;
            /* Slide down animation on load */
            animation: slideDown 0.4s ease-out forwards;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success { background-color: #E8F5E9; color: #2E7D32; border-left: 4px solid #4CAF50; }
        .alert-error { background-color: #FFEBEE; color: #C62828; border-left: 4px solid #F44336; }
        .alert-warning { background-color: #FFF8E1; color: #F57F17; border-left: 4px solid #FFC107; }

        /* Class added by JS to trigger fade out */
        .alert-hide {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* --- Main Form Container --- */
        .form-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(138, 90, 68, 0.05);
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-brown);
            margin-bottom: 8px;
        }

        .form-header p {
            font-size: 0.95rem;
            color: var(--text-light);
        }

        /* --- Form Inputs --- */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .input-group input:focus {
            border-color: var(--primary-brown);
            box-shadow: 0 0 0 3px rgba(138, 90, 68, 0.1);
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background: var(--hover-brown);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--primary-brown);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    {% if messages %}
    <div class="message-container" id="django-messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <nav class="navbar">
        <a href="/myapp/admin_dashboard/" class="brand-logo">Lefto.</a>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
    </nav>

    <div class="form-wrapper">
        <div class="form-card">
            
            <div class="form-header">
                <h2>Security Settings</h2>
                <p>Update your password to keep your account secure.</p>
            </div>

            <form action="" method="post">
                {% csrf_token %}

                <div class="input-group">
                    <label>Current Password</label>
                    <input type="password" name="current_password" placeholder="••••••••" required>
                </div>

                <hr style="border: 0; height: 1px; background: var(--border-color); margin: 25px 0;">

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" placeholder="••••••••" minlength="8" required>
                    <span class="helper-text">Must be at least 8 characters long.</span>
                </div>

                <div class="input-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" minlength="8" required>
                </div>

                <button type="submit" name="change" class="submit-btn">Update Password</button>

            </form>

            <a href="#" class="forgot-link">Forgot your current password?</a>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const messageContainer = document.getElementById("django-messages");
            
            if (messageContainer) {
                const alerts = messageContainer.querySelectorAll('.alert');
                
                alerts.forEach(function(alert, index) {
                    // Wait 4 seconds before starting the fade out
                    setTimeout(() => {
                        alert.classList.add('alert-hide');
                        
                        // Wait another 0.5s for the CSS fade transition to finish, then remove it
                        setTimeout(() => {
                            alert.remove();
                            // Clean up the container from the DOM if it's empty
                            if (messageContainer.children.length === 0) {
                                messageContainer.remove();
                            }
                        }, 500); 
                    }, 4000); 
                });
            }
        });
    </script>

</body>
</html>
