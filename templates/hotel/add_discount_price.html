<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lefto | Create Discount Deal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Lefto Aesthetic Brown Light Theme Colors */
            --bg-main: #FDFBF8;
            --bg-secondary: #F4EFEB;
            --primary-brown: #8A5A44;
            --hover-brown: #6A4432;
            --text-dark: #3E2723;
            --text-light: #7A6960;
            --white: #FFFFFF;
            --border-color: #EAE0D5;
            --success: #388E3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Top Navigation --- */
        .navbar {
            background-color: var(--white);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-brown);
            text-decoration: none;
        }

        .back-btn {
            padding: 8px 16px;
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-light);
        }

        /* --- Main Content Area --- */
        .content-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h2 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--primary-brown);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1.05rem;
        }

        /* --- Form Container --- */
        .form-container {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(138, 90, 68, 0.05);
        }

        .section-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
            border-bottom: 2px solid var(--bg-secondary);
            padding-bottom: 8px;
        }

        /* --- Custom Visual Radio Card Grid --- */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto; /* Adds a scrollbar if there are too many food items */
            padding-right: 10px;
        }

        /* Custom Scrollbar for the grid */
        .food-grid::-webkit-scrollbar { width: 6px; }
        .food-grid::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

        /* Hide the actual radio button */
        .hidden-radio {
            display: none;
        }

        /* Style the label to look like a card */
        .food-card {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            background-color: var(--white);
        }

        .food-card:hover {
            border-color: var(--primary-brown);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 90, 68, 0.08);
        }

        /* When the hidden radio is checked, highlight the card! */
        .hidden-radio:checked + .food-card {
            border-color: var(--primary-brown);
            background-color: var(--bg-main);
            box-shadow: 0 0 0 3px rgba(138, 90, 68, 0.1);
        }

        .food-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .food-info h4 {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .food-info p {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .food-stats {
            display: flex;
            justify-content: space-between;
            margin-top: auto; /* Pushes stats to the bottom of the card */
            padding-top: 10px;
            border-top: 1px dashed var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .original-price { color: var(--text-dark); }
        .qty-badge { color: var(--primary-brown); background: var(--bg-secondary); padding: 2px 8px; border-radius: 10px; }

        /* --- Bottom Inputs (Price & Validity) --- */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-brown);
            box-shadow: 0 0 0 3px rgba(138, 90, 68, 0.1);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background: var(--hover-brown);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .input-row { grid-template-columns: 1fr; }
            .form-container { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/myapp/partner_dashboard/" class="brand-logo">Lefto.</a>
        <a href="/myapp/partner_dashboard/" class="back-btn">← Back to Dashboard</a>
    </nav>

    <div class="content-wrapper">
        
        <div class="page-header">
            <h2>Post a Discount Deal</h2>
            <p>Select an item from your standard menu and set a new leftover price.</p>
        </div>

        <div class="form-container">
            <form action="" method="post">
                {% csrf_token %}

                <div class="section-label">1. Select Food Item</div>
                
                <div class="food-grid">
                    
                    {% for i in data %}
                    
                    <label>
                        <input type="radio" name="food" value="{{ i.id }}" class="hidden-radio" required>
                        
                        <div class="food-card">
                            <img src="{{ i.image.url }}" alt="{{ i.name }}" class="food-image">
                            
                            <div class="food-info">
                                <h4>{{ i.name }}</h4>
                                <p>{{ i.details }}</p>
                                <p><strong>Added Date:</strong> {{ i.mfg }}</p>
                            </div>
                            
                            <div class="food-stats">
                                <span class="original-price">Standard: ₹{{ i.price }}</span>
                                <span class="qty-badge">Qty: {{ i.quantity }}</span>
                            </div>
                        </div>
                    </label>

                    {% endfor %}
                    </div>

                <div class="section-label">2. Set Lefto Deal Details</div>
                
                <div class="input-row">
                    <div class="input-group">
                        <label>Discounted Price (₹)</label>
                        <input type="number" step="0.01" name="discount_price" placeholder="e.g. 50.00" required>
                    </div>

                    <div class="input-group">
                        <label>Validity (Expiry Time)</label>
                        <input type="text" name="valid" placeholder="e.g. Valid till 11:00 PM" required>
                    </div>
                </div>

                <button type="submit" name="add" class="submit-btn">Publish Discount Deal</button>

            </form>
        </div>

    </div>

</body>
</html>
