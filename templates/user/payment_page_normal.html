<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lefto | Standard Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        :root {
            --bg-main: #FDFBF8;        
            --primary-brown: #8A5A44;  
            --text-dark: #3E2723;      
            --text-light: #7A6960;     
            --white: #FFFFFF;
            --border-color: #EAE0D5;
            --success: #388E3C;
            
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px 0 rgba(138, 90, 68, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: linear-gradient(135deg, #FDFBF8 0%, #F4EFEB 50%, #EAE0D5 100%);
            color: var(--text-dark); min-height: 100vh; position: relative; overflow-x: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }

        .blob-1, .blob-2 { position: absolute; border-radius: 50%; filter: blur(70px); z-index: -1; opacity: 0.5; animation: floatBlob 15s ease-in-out infinite; }
        .blob-1 { top: 10%; left: 10%; width: 400px; height: 400px; background: #8A5A44; }
        .blob-2 { bottom: 10%; right: 10%; width: 500px; height: 500px; background: #D5B4A3; animation-delay: -7s; animation-direction: reverse; }
        @keyframes floatBlob { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -40px) scale(1.1); } 66% { transform: translate(-20px, 30px) scale(0.9); } }

        .checkout-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 24px; width: 100%; max-width: 500px; padding: 40px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .checkout-header { text-align: center; margin-bottom: 30px; }
        .checkout-header h2 { font-size: 2rem; color: var(--primary-brown); margin-bottom: 5px; }
        .checkout-header p { color: var(--text-light); }

        .order-summary { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 30px; }
        .summary-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95rem; }
        .summary-item.total { border-top: 2px dashed rgba(138, 90, 68, 0.2); padding-top: 15px; margin-top: 15px; margin-bottom: 0; font-size: 1.3rem; font-weight: 700; color: var(--primary-brown); }

        .label { color: var(--text-light); font-weight: 600; }
        .value { color: var(--text-dark); font-weight: 700; text-align: right; }

        .btn-pay {
            width: 100%; background-color: var(--success); color: var(--white); padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(56, 142, 60, 0.2); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-pay:hover { background-color: #2E7D32; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 142, 60, 0.3); }

        .secure-badge { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-light); font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px; }
    </style>
</head>
<body>

    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="checkout-card">
        <div class="checkout-header">
            <h2>Standard Checkout</h2>
            <p>Review your fresh order and securely pay.</p>
        </div>

        <div class="order-summary">
            <div class="summary-item">
                <span class="label">Food Item:</span>
                <span class="value">{{ order.FOOD.name }}</span>
            </div>
            <div class="summary-item">
                <span class="label">Prepared By:</span>
                <span class="value">{{ order.FOOD.HOTEL.name }}</span>
            </div>
            <div class="summary-item">
                <span class="label">Quantity:</span>
                <span class="value">{{ order.quantity }}</span>
            </div>
            <div class="summary-item">
                <span class="label">Price per unit:</span>
                <span class="value">₹{{ order.FOOD.price }}</span>
            </div>
            
            <div class="summary-item total">
                <span class="label">Total Amount:</span>
                <span class="value">₹{{ total_display }}</span>
            </div>
        </div>

        <button id="pay-button" class="btn-pay">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Pay ₹{{ total_display }} Securely
        </button>

        <div class="secure-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Secured by Razorpay
        </div>
    </div>

    <script>
        var options = {
            key: '{{ razorpay_api_key }}',
            amount: '{{ amount }}', 
            currency: '{{ currency }}',
            name: 'Lefto.',
            description: 'Standard Fresh Food Order',
            order_id: '{{ rzp_order_id }}',
            prefill: {
                name: '{{ order.USER.name }}',
                email: '{{ order.USER.email }}',
                contact: '{{ order.USER.phone }}'
            },
            theme: { color: '#8A5A44' },
            handler: function(response) {
                // Call the standard success URL to mark order_table as paid
                window.location.href = '/myapp/payment_success_normal/{{ order.id }}/';
            }
        };

        var rzp = new Razorpay(options);
        document.getElementById('pay-button').onclick = function (e) {
            rzp.open();
            e.preventDefault();
        };
    </script>

</body>
</html>
